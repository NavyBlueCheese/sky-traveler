<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4facf0"/>
      <stop offset="45%" stop-color="#8fd0f3"/>
      <stop offset="78%" stop-color="#ffd9a8"/>
      <stop offset="100%" stop-color="#ffb27a"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff6d8" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#ffe6a0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffe6a0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b1" cx="38%" cy="28%" r="80%"><stop offset="0%" stop-color="#ffd28a"/><stop offset="55%" stop-color="#ef7d57"/><stop offset="100%" stop-color="#c5563f"/></radialGradient>
    <radialGradient id="b2" cx="38%" cy="28%" r="80%"><stop offset="0%" stop-color="#e8def7"/><stop offset="55%" stop-color="#bda7e8"/><stop offset="100%" stop-color="#9d8ad6"/></radialGradient>
    <radialGradient id="b3" cx="38%" cy="28%" r="80%"><stop offset="0%" stop-color="#e3f5ea"/><stop offset="55%" stop-color="#67c29a"/><stop offset="100%" stop-color="#3f8f6c"/></radialGradient>
    <radialGradient id="b4" cx="38%" cy="28%" r="80%"><stop offset="0%" stop-color="#cfe0ff"/><stop offset="55%" stop-color="#5a8fd6"/><stop offset="100%" stop-color="#2c4f86"/></radialGradient>
    <radialGradient id="b5" cx="38%" cy="28%" r="80%"><stop offset="0%" stop-color="#ffe6a8"/><stop offset="55%" stop-color="#ff9f43"/><stop offset="100%" stop-color="#f57c00"/></radialGradient>
    <radialGradient id="lan" cx="50%" cy="40%" r="60%"><stop offset="0%" stop-color="#fff3c4"/><stop offset="100%" stop-color="#ffb347"/></radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>

  <!-- sky -->
  <rect width="1200" height="675" fill="url(#sky)"/>
  <circle cx="980" cy="150" r="240" fill="url(#sun)"/>

  <!-- stars (upper area) -->
  <g fill="#ffffff">
    <circle cx="120" cy="70" r="2.5"/><circle cx="260" cy="48" r="1.8"/><circle cx="430" cy="90" r="2.2"/>
    <circle cx="700" cy="55" r="2"/><circle cx="860" cy="40" r="1.6"/><circle cx="1080" cy="80" r="2.4"/>
    <circle cx="560" cy="38" r="1.5"/><circle cx="1010" cy="200" r="1.8"/>
  </g>

  <!-- background clouds -->
  <g fill="#ffffff" opacity="0.85">
    <g transform="translate(60,470)"><circle cx="55" cy="55" r="34"/><circle cx="98" cy="40" r="44"/><circle cx="146" cy="54" r="32"/><circle cx="112" cy="66" r="34"/><circle cx="74" cy="66" r="28"/></g>
    <g transform="translate(880,420)"><circle cx="55" cy="55" r="30"/><circle cx="92" cy="42" r="40"/><circle cx="132" cy="54" r="28"/><circle cx="100" cy="64" r="30"/></g>
  </g>

  <!-- birds -->
  <g stroke="#3a5570" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7">
    <path d="M150 150 Q165 132 180 150 Q195 132 210 150"/>
    <path d="M250 120 Q262 106 274 120 Q286 106 298 120"/>
  </g>

  <!-- ============ BALLOONS ============ -->
  <!-- helper balloons -->
  <g transform="translate(170,300)">
    <path d="M0 0 C-58 0 -84 56 -84 104 C-84 152 -38 182 0 196 C38 182 84 152 84 104 C84 56 58 0 0 0Z" fill="url(#b2)"/>
    <path d="M0 0 C-18 0 -28 56 -28 104 C-28 152 -10 182 0 196 C10 182 28 152 28 104 C28 56 18 0 0 0Z" fill="#fff" opacity="0.35"/>
    <path d="M-30 196 L-12 232 M30 196 L12 232 M0 200 L0 232" stroke="#9a6b4f" stroke-width="2.5" fill="none"/>
    <rect x="-16" y="232" width="32" height="24" rx="4" fill="#a9784f" stroke="#7d5635" stroke-width="2"/>
  </g>

  <g transform="translate(1010,330)">
    <path d="M0 0 C-52 0 -76 50 -76 94 C-76 138 -34 164 0 176 C34 164 76 138 76 94 C76 50 52 0 0 0Z" fill="url(#b3)"/>
    <path d="M0 0 C-16 0 -25 50 -25 94 C-25 138 -9 164 0 176 C9 164 25 138 25 94 C25 50 16 0 0 0Z" fill="#fff" opacity="0.35"/>
    <path d="M-28 176 L-11 210 M28 176 L11 210 M0 180 L0 210" stroke="#9a6b4f" stroke-width="2.5" fill="none"/>
    <rect x="-15" y="210" width="30" height="22" rx="4" fill="#a9784f" stroke="#7d5635" stroke-width="2"/>
  </g>

  <g transform="translate(1110,150)">
    <path d="M0 0 C-40 0 -58 38 -58 72 C-58 106 -26 126 0 135 C26 126 58 106 58 72 C58 38 40 0 0 0Z" fill="url(#b5)"/>
    <path d="M-22 135 L-9 162 M22 135 L9 162 M0 138 L0 162" stroke="#9a6b4f" stroke-width="2" fill="none"/>
    <rect x="-12" y="162" width="24" height="18" rx="3" fill="#a9784f"/>
  </g>

  <g transform="translate(95,150)">
    <path d="M0 0 C-38 0 -55 36 -55 68 C-55 100 -25 119 0 128 C25 119 55 100 55 68 C55 36 38 0 0 0Z" fill="url(#b4)"/>
    <path d="M-20 128 L-8 153 M20 128 L8 153 M0 131 L0 153" stroke="#9a6b4f" stroke-width="2" fill="none"/>
    <rect x="-11" y="153" width="22" height="17" rx="3" fill="#a9784f"/>
  </g>

  <!-- HERO balloon (center-right) -->
  <g transform="translate(625,250)">
    <path d="M0 0 C-92 0 -132 86 -132 158 C-132 230 -56 278 0 296 C56 278 132 230 132 158 C132 86 92 0 0 0Z" fill="url(#b1)"/>
    <path d="M0 0 C-28 0 -42 86 -42 158 C-42 218 -14 268 0 296 C14 268 42 218 42 158 C42 86 28 0 0 0Z" fill="#ffe9c4" opacity="0.55"/>
    <path d="M0 0 C-10 0 -15 86 -15 158 C-15 218 -6 268 0 296 C6 268 15 218 15 158 C15 86 10 0 0 0Z" fill="#fff7e6" opacity="0.5"/>
    <path d="M-44 285 L-18 348 M44 285 L18 348 M0 296 L0 348" stroke="#9a6b4f" stroke-width="3" fill="none"/>
    <rect x="-26" y="348" width="52" height="38" rx="6" fill="#a9784f" stroke="#7d5635" stroke-width="2.5"/>
    <line x1="-13" y1="348" x2="-13" y2="386" stroke="#7d5635" stroke-width="1.5"/>
    <line x1="0" y1="348" x2="0" y2="386" stroke="#7d5635" stroke-width="1.5"/>
    <line x1="13" y1="348" x2="13" y2="386" stroke="#7d5635" stroke-width="1.5"/>
  </g>

  <!-- sky lanterns -->
  <g transform="translate(470,520)">
    <path d="M-14 0 Q-14 -26 0 -26 Q14 -26 14 0 L11 38 Q0 50 -11 38 Z" fill="url(#lan)"/>
    <rect x="-9" y="-30" width="18" height="6" rx="3" fill="#c98a3c"/>
  </g>
  <g transform="translate(820,560)" opacity="0.95">
    <path d="M-12 0 Q-12 -22 0 -22 Q12 -22 12 0 L9 32 Q0 42 -9 32 Z" fill="url(#lan)"/>
    <rect x="-8" y="-26" width="16" height="5" rx="2.5" fill="#c98a3c"/>
  </g>

  <!-- paper plane -->
  <g transform="translate(360,120) rotate(-8)">
    <path d="M0 17 L40 4 L24 18 L40 30 Z" fill="#fff" stroke="#cdd9e6" stroke-width="1.5"/>
    <path d="M24 18 L18 30 L15 21 Z" fill="#e6eef7"/>
  </g>

  <!-- ============ HEADLINE ============ -->
  <g text-anchor="middle">
    <text x="600" y="92" font-size="34" letter-spacing="9" fill="#1f3550" font-style="italic" font-family="Georgia, serif">A PERSONALITY JOURNEY THROUGH THE CLOUDS</text>
    <text x="600" y="585" font-size="92" font-weight="700" fill="#1b3047" font-family="'Playfair Display', Georgia, serif">Which balloon are you?</text>
    <text x="600" y="638" font-size="30" fill="#3a5570" font-family="Helvetica, Arial, sans-serif">Eight sky travelers · twelve questions · one whimsical reveal</text>
  </g>

  <!-- foreground horizon clouds -->
  <g fill="#ffffff" opacity="0.9">
    <g transform="translate(-20,600)"><circle cx="60" cy="60" r="44"/><circle cx="120" cy="44" r="56"/><circle cx="186" cy="60" r="42"/><circle cx="140" cy="74" r="44"/><circle cx="90" cy="76" r="36"/></g>
    <g transform="translate(1000,600)"><circle cx="60" cy="60" r="44"/><circle cx="120" cy="44" r="56"/><circle cx="186" cy="60" r="42"/><circle cx="140" cy="74" r="44"/><circle cx="90" cy="76" r="36"/></g>
  </g>
</svg>
